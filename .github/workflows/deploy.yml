name: Frontend Build and Deploy to Home Server

on:
  push:
    branches: ['main'] # main 브랜치에 코드가 push되거나 merge되면 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # GitHub의 무료 가상 컴퓨터 사용

    steps:
      # 1단계: 내 소스 코드 다운로드
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2단계: GitHub 자체 저장소(GHCR) 로그인
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub이 자체 발급하는 토큰

      # 3단계: Docker 이미지 빌드 후 GHCR에 업로드(Push)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-frontend:latest
          build-args: |
            REACT_APP_GRAPHQL_URI=${{ secrets.GRAPHQL_URI }}
            REACT_APP_YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
            REACT_APP_YOUTUBE_CHANNEL_ID=${{ secrets.YOUTUBE_CHANNEL_ID }}
            REACT_APP_YOUTUBE_SUNDAYPLAYLIST_ID=${{ secrets.YOUTUBE_SUNDAYPLAYLIST_ID }}
            REACT_APP_YOUTUBE_FRIDAYPLAYLIST_ID=${{ secrets.YOUTUBE_FRIDAYPLAYLIST_ID }}
            REACT_APP_YOUTUBE_SPECIAL_PRAISE_ID=${{ secrets.YOUTUBE_SPECIAL_PRAISE_ID }}
            REACT_APP_YOUTUBE_WEDNESDAY_PRAISE_ID=${{ secrets.YOUTUBE_WEDNESDAY_PRAISE_ID }}
            REACT_APP_YOUTUBE_SUNDAY_PRAISE_ID=${{ secrets.YOUTUBE_SUNDAY_PRAISE_ID }}
            REACT_APP_YOUTUBE_YOUTH_WORSHIP_ID=${{ secrets.YOUTUBE_YOUTH_WORSHIP_ID }}
            REACT_APP_KAKAO_MAP_KEY=${{ secrets.KAKAO_MAP_KEY }}

      # 4~5단계: 홈서버에 SSH로 원격 접속하여 새 이미지 Pull 및 컨테이너 재실행
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TEST_SERVER_HOST }} # 홈서버의 외부 IP 주소 (또는 도메인)
          username: ${{ secrets.TEST_SERVER_USER }} # 홈서버 접속 계정명 (예: ubuntu 등)
          key: ${{ secrets.TEST_SERVER_SSH_KEY }} # 홈서버 접속용 SSH 개인키 (Private Key)
          port: 22 # SSH 포트 (기본값 22)
          script: |
            # 1. 홈서버에 만들어둔 프로젝트 디렉토리로 이동
            cd ~/outsourcing/gwanghyewon-full-gospel-church

            # 2. GHCR에 로그인 (홈서버가 이미지를 받아오기 위함)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 3. docker-compose.yml 에 적힌 최신 이미지들을 한방에 다운로드(Pull)
            docker compose pull

            # 4. 기존 컨테이너들을 멈추고, 새 이미지로 컨테이너들을 백그라운드(-d)에서 다시 띄우기
            docker compose up -d --remove-orphans

            # 5. 쓰레기 이미지 자동 청소 (용량 확보)
            docker image prune -f
